<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inventory Scanner">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Spooky Stitchcrafts — Inventory Scanner</title>
<style>
  :root{--bg:#0e0b14;--card:#1a1424;--accent:#8b3cf7;--gold:#d9a441;--ok:#3c6;--bad:#e25563;--text:#ece6f5;--muted:#9b8fb0}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}
  header{padding:8px 12px;background:#160f22;border-bottom:1px solid #2a2138;display:flex;align-items:center;gap:8px}
  header h1{font-size:14px;margin:0;font-weight:700}
  .handle{position:fixed;top:46%;z-index:31;border:1px solid #2a2138;color:#fff;font-size:18px;padding:16px 5px;line-height:1}
  .handle.left{left:0;border-left:0;border-radius:0 12px 12px 0;background:#160f22}
  .handle.right{right:0;border-right:0;border-radius:12px 0 0 12px;background:var(--accent)}
  .drawer{position:fixed;top:0;bottom:0;width:64%;max-width:240px;background:#160f22;z-index:32;display:flex;flex-direction:column;gap:10px;padding:18px 14px;transition:transform .25s ease}
  .drawer.left{left:0;border-right:1px solid #2a2138;transform:translateX(-100%)}
  .drawer.right{right:0;border-left:1px solid #2a2138;transform:translateX(100%)}
  .drawer.open{transform:translateX(0)}
  .drawer-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .draw-btn{padding:12px;border:1px solid #2a2138;border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-weight:600;text-align:left}
  .draw-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .drawer .ctl{flex:none;width:100%;margin:0;padding:12px;font-size:14px;text-align:left}
  .zoomlabel{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
  .zoomlabel #zoomVal{color:var(--gold)}
  .zoomrow{display:flex;align-items:center;gap:8px}
  .zoomrow input{flex:1;min-width:0}
  .zbtn{width:40px;height:40px;flex:none;font-size:22px;border:1px solid #2a2138;border-radius:8px;background:var(--card);color:var(--text)}
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;opacity:0;pointer-events:none;transition:opacity .25s}
  .backdrop.show{opacity:1;pointer-events:auto}
  .camwrap{position:relative;margin-top:8px;line-height:0}
  #video{width:100%;max-height:32vh;object-fit:cover;background:#000;display:block}
  .focus-ring{position:absolute;width:60px;height:60px;margin:-30px 0 0 -30px;border:2px solid var(--gold);border-radius:50%;box-sizing:border-box;pointer-events:none;opacity:0;transform:scale(1.3);transition:opacity .12s,transform .12s}
  .focus-ring.show{opacity:1;transform:scale(1)}
  .align{position:absolute;top:50%;left:50%;width:88%;height:74%;transform:translate(-50%,-50%);pointer-events:none}
  .align span{position:absolute;width:18px;height:18px;border:3px solid var(--gold)}
  .align .tl{top:0;left:0;border-right:0;border-bottom:0;border-radius:6px 0 0 0}
  .align .tr{top:0;right:0;border-left:0;border-bottom:0;border-radius:0 6px 0 0}
  .align .bl{bottom:0;left:0;border-right:0;border-top:0;border-radius:0 0 0 6px}
  .align .br{bottom:0;right:0;border-left:0;border-top:0;border-radius:0 0 6px 0}
  .controls{display:flex;gap:8px;margin:8px 12px 0}
  .ctl{flex:1;padding:8px;font-size:12px;font-weight:600;border:1px solid #2a2138;border-radius:8px;background:var(--card);color:var(--text)}
  .ctl.on{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .panel{margin:8px 12px 0;background:var(--card);border:1px solid #2a2138;border-radius:10px;padding:10px}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  input{width:100%;padding:9px;font-size:16px;background:#0e0b14;border:1px solid #2a2138;border-radius:8px;color:var(--text)}
  .qtyrow{display:flex;gap:8px;align-items:center;margin-top:8px}
  .qtyrow button{width:44px;height:44px;font-size:22px;border-radius:8px;border:1px solid #2a2138;background:#0e0b14;color:var(--text)}
  .qtyrow input{text-align:center;font-size:20px}
  .capture{display:block;margin:8px 12px 0;padding:12px;font-size:16px;font-weight:700;border:0;border-radius:8px;background:var(--accent);color:#fff;width:calc(100% - 24px)}
  .capture:disabled{opacity:.45}
  .capture.ready{background:var(--ok);animation:pulse 1s infinite}
  .capture.paused{background:var(--gold);color:#1a1206;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
  .submit{width:100%;margin-top:10px;padding:12px;font-size:16px;font-weight:700;border:0;border-radius:8px;background:var(--gold);color:#1a1206}
  .submit:disabled{opacity:.5}
  .log{margin:8px 12px 24px}
  .row{display:flex;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:6px;background:var(--card);border-left:3px solid #2a2138;margin-bottom:6px;font-size:13px}
  .row.ok{border-left-color:var(--ok)} .row.bad{border-left-color:var(--bad)}
  .row .q{color:var(--muted);font-size:11px}
  .hint{color:var(--muted);font-size:11px;margin:4px 12px 0}
  .err{color:var(--bad)}
  .preview{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  #pvImg{width:48px;height:48px;object-fit:contain;background:#fff;border-radius:6px;display:none;flex:none}
  .pvName{font-size:13px;font-weight:600;min-height:16px}
  .pvName.unknown{color:var(--bad)}
  .sess{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}
  .installbtn{display:none;font-size:12px;font-weight:700;border:0;border-radius:8px;background:var(--accent);color:#fff;padding:5px 10px}
  .installbtn.show{display:inline-block}
  .qbadge{font-size:11px;font-weight:700;color:#1a1206;background:var(--gold);padding:2px 8px;border-radius:10px;white-space:nowrap}
  .flash{position:fixed;inset:0;background:var(--ok);opacity:0;pointer-events:none;z-index:40;transition:opacity .12s}
  .flash.show{opacity:.4}
  .row{cursor:pointer}
  .rrow{display:flex;align-items:center;gap:8px}
  .row .view{font-size:12px;opacity:.45}
  .imodal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82);padding:18px}
  .imodal.show{display:flex}
  .imodal .box{background:var(--card);border:1px solid #2a2138;border-radius:14px;padding:14px;max-width:94vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:10px}
  .imodal img{max-width:86vw;max-height:60vh;object-fit:contain;background:#fff;border-radius:8px}
  .imodal .nm{font-size:15px;font-weight:700;text-align:center}
  .imodal .nm.unknown{color:var(--bad)}
  .imodal .sk{font-size:12px;color:var(--muted);word-break:break-all;text-align:center}
  .imodal .cls{margin-top:2px;padding:10px 20px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;font-size:14px}
  /* Native (ML Kit) scan: camera renders behind the webview; make the preview window transparent so it shows through */
  body.native-scan{ background:transparent !important; }
  body.native-scan #video{ display:none; }
  body.native-scan .camwrap{ min-height:42vh; }
  .undo{width:100%;margin-top:10px;padding:10px;font-size:14px;font-weight:600;border:1px solid #2a2138;border-radius:8px;background:var(--card);color:var(--text)}
  .undo:disabled{opacity:.5}
  .row.queued{border-left-color:var(--gold)} .row.undo{border-left-color:var(--muted)}
</style>
</head>
<body>
<header><span style="font-size:20px">🦇</span><h1>Inventory Scanner</h1>
  <button id="installBtn" class="installbtn">📲 Install</button>
  <span id="queueBadge" class="qbadge" hidden>0 queued</span>
  <span id="sessCount" class="sess">0 scanned</span>
</header>
<div id="flash" class="flash"></div>
<div id="imodal" class="imodal">
  <div class="box">
    <img id="imodalImg" alt="">
    <div id="imodalName" class="nm"></div>
    <div id="imodalSku" class="sk"></div>
    <button id="imodalClose" class="cls">Close</button>
  </div>
</div>

<button id="hTools" class="handle left" aria-label="Open tools">🔦</button>
<button id="hMode" class="handle right" aria-label="Open mode">📥</button>
<div id="backdrop" class="backdrop"></div>

<aside id="drawerTools" class="drawer left">
  <div class="drawer-title">Tools</div>
  <button id="torch" class="ctl" hidden>🔦 Light: Off</button>
  <div id="torchWrap" hidden>
    <div class="zoomlabel"><span>💡 Brightness</span><span id="torchVal"></span></div>
    <div class="zoomrow">
      <button id="torchDown" class="zbtn" aria-label="Dimmer">−</button>
      <input id="torchLevel" type="range" min="1" step="1" aria-label="Torch brightness">
      <button id="torchUp" class="zbtn" aria-label="Brighter">+</button>
    </div>
  </div>
  <button id="macro" class="ctl" hidden>🔬 Macro: Off</button>
  <button id="scanmode" class="ctl">🖐️ Tap to Scan</button>
  <div id="zoomWrap" hidden>
    <div class="zoomlabel"><span>🔎 Zoom</span><span id="zoomVal">1.0×</span></div>
    <div class="zoomrow">
      <button id="zoomOut" class="zbtn" aria-label="Zoom out">−</button>
      <input id="zoom" type="range" aria-label="Zoom">
      <button id="zoomIn" class="zbtn" aria-label="Zoom in">+</button>
    </div>
  </div>
  <button id="waitReady" class="ctl">⏸️ Wait for Ready: Off</button>
  <div id="waitWrap">
    <div class="zoomlabel"><span>⏱️ Auto wait</span><span id="waitVal">30s</span></div>
    <div class="zoomrow">
      <button id="waitDown" class="zbtn" aria-label="Less wait">−</button>
      <input id="waitSlider" type="range" min="5" max="120" step="5" value="30" aria-label="Auto wait seconds">
      <button id="waitUp" class="zbtn" aria-label="More wait">+</button>
    </div>
  </div>
</aside>

<aside id="drawerMode" class="drawer right">
  <div class="drawer-title">Mode</div>
  <button id="mReceive" class="draw-btn on">📥 Receiving (+)</button>
  <button id="mCount" class="draw-btn">🔢 Count (set)</button>
</aside>

<div class="camwrap">
  <video id="video" playsinline muted></video>
  <div class="align"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>
  <div id="focusRing" class="focus-ring"></div>
</div>
<button id="capture" class="capture">📷 Scan</button>
<button id="autoCtrl" class="capture" hidden>⏸ Pause</button>
<div class="hint" id="camHint">Frame the QR you want, then tap “Scan”.</div>

<div class="panel">
  <div id="preview" class="preview">
    <img id="pvImg" alt="">
    <div id="pvName" class="pvName">Scan or type a SKU…</div>
  </div>
  <label>SKU</label>
  <input id="sku" placeholder="scan or type SKU" autocomplete="off">
  <div class="qtyrow">
    <button id="minus">−</button>
    <input id="qty" type="number" inputmode="numeric" value="1">
    <button id="plus">+</button>
  </div>
  <label for="bin" style="margin-top:8px">Bin / Location (optional)</label>
  <input id="bin" placeholder="e.g. A-03" autocomplete="off">
  <button class="submit" id="submit">Submit</button>
  <div class="hint" id="status"></div>
  <button id="undo" class="undo" hidden>↩︎ Undo last scan</button>
</div>

<div class="log" id="log"></div>

<script>
/* ===== CONFIG — paste these two after deploying Code.gs ===== */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9zQJZDpnKnCmkjUoHhLKdWA98Vy3OCritikSVaSovhfot3m6MdSZWJI2_-MQsC7oe/exec';
const SHARED_SECRET   = 'HK7nvDVin0qFErL0Cie9sTD61gZ4vCSz'; // must match Code.gs
/* =========================================================== */

const $ = id => document.getElementById(id);
/* ---- Persisted preferences (mode, scan mode, zoom, bin) ---- */
const PREF = JSON.parse(localStorage.getItem('scanPrefs')||'{}');
function savePrefs(){ try{ localStorage.setItem('scanPrefs', JSON.stringify({ mode, scanMode, zoom: $('zoom').value, bin: $('bin').value, autoWait: AUTO_PAUSE_SECS, waitForReady, macro: macroOn, torchLevel })); }catch(_){ } }
let mode = PREF.mode || 'receive';

/* ---- Product image/title lookup (sku-map.json, generated from Shopify) ---- */
let SKU_MAP = {}, IMG_BASE = '';
fetch('sku-map.json').then(r=>r.json()).then(d=>{ SKU_MAP = d.map||{}; IMG_BASE = d._base||''; })
  .catch(()=>{ $('pvName').textContent = '(sku-map.json not found — image preview off)'; });
function showPreview(sku){
  const rec = SKU_MAP[sku];
  const img = $('pvImg'), name = $('pvName');
  if(rec){
    img.src = IMG_BASE + rec[1]; img.style.display='block';
    name.textContent = rec[0]; name.className='pvName';
  } else {
    img.style.display='none';
    name.textContent = sku ? 'Unknown SKU: '+sku : 'Scan or type a SKU…';
    name.className = 'pvName'+(sku?' unknown':'');
  }
}
function setMode(m){ mode = m;
  $('mReceive').classList.toggle('on', m==='receive');
  $('mCount').classList.toggle('on', m==='count');
  $('qty').value = m==='receive' ? 1 : 0;
  $('hMode').textContent = m==='receive' ? '📥' : '🔢';   // tab reflects current mode
  savePrefs();
}
$('mReceive').onclick = ()=>{ setMode('receive'); closeDrawers(); };
$('mCount').onclick   = ()=>{ setMode('count');   closeDrawers(); };

/* ---- Edge drawers (mode on the right, tools on the left) ---- */
function closeDrawers(){ $('drawerMode').classList.remove('open'); $('drawerTools').classList.remove('open'); $('backdrop').classList.remove('show'); }
function toggleDrawer(el){
  const open = !el.classList.contains('open');
  closeDrawers();
  if(open){ el.classList.add('open'); $('backdrop').classList.add('show'); }
}
$('hMode').onclick  = ()=>toggleDrawer($('drawerMode'));
$('hTools').onclick = ()=>toggleDrawer($('drawerTools'));
$('backdrop').onclick = closeDrawers;
$('plus').onclick  = ()=>$('qty').value = (parseInt($('qty').value||0)+1);
$('minus').onclick = ()=>$('qty').value = Math.max(0, parseInt($('qty').value||0)-1);

/* ---- Camera scanning via BarcodeDetector (Chrome on Android) ---- */
let lastCode = '', lastAt = 0;
let detector = null, scanCanvas = null, sctx = null;
let rafRunning = false, starting = false, recovering = false, lastDetect = 0;
const DETECT_MS = 80, DETECT_LONG = 1920;   // detect a near-full frame at up to ~1920px long edge — uses the high-res sensor detail to resolve thin 1D bars
const TAP_HOLD_MS = 1500;          // tap mode: keep the Scan button "ready" this long after the last detection
// Set the camera hint to an error message safely (never inject untrusted text as HTML).
function camErr(msg){ const h=$('camHint'); h.textContent=''; const s=document.createElement('span'); s.className='err'; s.textContent=msg; h.appendChild(s); }

// Build a detector limited to the formats this device actually supports.
async function buildDetector(){
  try{
    let want = ['qr_code','data_matrix','code_128','code_39','code_93','codabar','itf','ean_13','ean_8','upc_a','upc_e'];
    if(BarcodeDetector.getSupportedFormats){
      const sup = await BarcodeDetector.getSupportedFormats();
      const f = want.filter(x=>sup.includes(x));
      want = f.length ? f : ['qr_code'];
    }
    return new BarcodeDetector({ formats: want });
  }catch(_){ try{ return new BarcodeDetector(); }catch(__){ return null; } }
}
// Open a camera, trying progressively looser constraints so odd devices still work.
async function getCameraStream(){
  const tries = [
    { facingMode:{ ideal:'environment' }, width:{ ideal:3840 }, height:{ ideal:2160 } },   // ask for the sensor's max (4K) — most detail for thin 1D bars
    { facingMode:{ ideal:'environment' }, width:{ ideal:1920 }, height:{ ideal:1080 } },
    { facingMode:'environment' },
    true
  ];
  let err;
  for(const video of tries){
    try{ return await navigator.mediaDevices.getUserMedia({ video }); }catch(e){ err = e; }
  }
  throw err;
}
async function startScanner(){
  if(starting) return; starting = true;                       // guard re-entrancy (restart races)
  if(!('BarcodeDetector' in window)){
    camErr("This browser can't scan with the camera. Use Chrome on Android, or type the SKU.");
    $('video').style.display='none'; starting = false; return;
  }
  try{
    if(!detector) detector = await buildDetector();
    if(!detector){ camErr('Barcode scanning unsupported here — type the SKU instead.'); $('video').style.display='none'; starting = false; return; }
    const stream = await getCameraStream();
    if(activeStream && activeStream !== stream){ activeStream.getTracks().forEach(tr=>tr.stop()); }
    activeStream = stream; currentLens = 'main';
    const v = $('video'); v.style.display='block'; v.srcObject = stream; await v.play();
    watchStream(stream);
    await detectLenses(stream);
    setupTorch(stream); setupFocus(stream); setupZoom(stream); keepAwake();
    startLoop();
  }catch(err){
    camErr('Camera blocked: ' + ((err && err.message) || err) + '. Type the SKU instead.');
  }
  starting = false;
}
// One persistent detection loop, created once — never duplicated across camera restarts.
function startLoop(){
  if(rafRunning) return; rafRunning = true;
  if(!scanCanvas){ scanCanvas = document.createElement('canvas'); sctx = scanCanvas.getContext('2d', { willReadFrequently:true }); }
  const v = $('video');
  const tick = async (ts)=>{
    const idleAuto = (scanMode==='auto' && autoPaused);       // skip detect work while auto-paused
    if(!document.hidden && !idleAuto && !modalOpen && detector && v.videoWidth && (ts - lastDetect) >= DETECT_MS){
      lastDetect = ts;
      try{
        const vw=v.videoWidth, vh=v.videoHeight;
        const cw=Math.floor(vw*0.92), ch=Math.floor(vh*0.92);   // near-full frame (drop only the extreme edges)
        const sx=(vw-cw)>>1, sy=(vh-ch)>>1;
        const k=DETECT_LONG/Math.max(cw,ch), ow=Math.round(cw*k), oh=Math.round(ch*k);
        if(scanCanvas.width!==ow || scanCanvas.height!==oh){ scanCanvas.width=ow; scanCanvas.height=oh; }
        sctx.drawImage(v, sx, sy, cw, ch, 0, 0, ow, oh);   // downscale the wide frame so 1D barcodes fit + stay sharp
        const codes = await detector.detect(scanCanvas);
        if(codes.length){ handleDetected(String(codes[0].rawValue||'').trim()); }
        else if(scanMode!=='auto' && pendingCode && (Date.now()-pendingAt) > TAP_HOLD_MS){
          pendingCode=''; const c=$('capture'); c.disabled=true; c.classList.remove('ready'); c.textContent='📷 Scan';   // clear only after the hold window
        }
      }catch(_){}
    }
    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}
// Recover automatically if the OS revokes the camera (backgrounding / another app grabs it).
function watchStream(stream){
  const t = stream.getVideoTracks()[0];
  if(t) t.addEventListener('ended', onTrackEnded, { once:true });
}
async function onTrackEnded(){
  if(recovering || document.hidden) return;                   // foreground only; visibility handler covers re-entry
  recovering = true;
  await startScanner();
  recovering = false;
}
/* ---- Native (Capacitor + ML Kit) scanning: far more robust 1D decoding than the web
        BarcodeDetector. Active ONLY inside the Capacitor app; in a plain browser/TWA these
        guards are false, so this stays inert and the web camera path runs instead. ---- */
const CAP = window.Capacitor;
const NATIVE = !!(CAP && CAP.isNativePlatform && CAP.isNativePlatform());
const MLKit = (NATIVE && CAP.Plugins && CAP.Plugins.BarcodeScanner) || null;
const NATIVE_FORMATS = ['QR_CODE','DATA_MATRIX','CODE_128','CODE_39','CODE_93','CODABAR','ITF','EAN_13','EAN_8','UPC_A','UPC_E'];
let nativeTorchOn = false, torchMax = 0, torchLevel = Number(PREF.torchLevel) || 0;
async function startNativeScan(){
  try{
    const perm = await MLKit.requestPermissions();
    if(perm && perm.camera && perm.camera !== 'granted' && perm.camera !== 'limited'){
      camErr('Camera permission denied — enable it in Settings, or type the SKU.'); return;
    }
    document.documentElement.style.background = 'transparent';
    document.body.classList.add('native-scan');          // transparent preview window → native camera shows through
    $('torch').hidden = false; $('macro').hidden = true; // torch via the plugin; macro/manual-focus is N/A natively
    // Route native barcode events through the SAME handler the web path uses (auto/tap, debounce, pause all reused).
    await MLKit.addListener('barcodesScanned', (ev)=>{
      if(modalOpen || !ev || !ev.barcodes) return;
      for(const b of ev.barcodes){ if(b && b.rawValue){ handleDetected(String(b.rawValue).trim()); break; } }
    });
    await MLKit.addListener('scanError', ()=>{});
    await MLKit.startScan({ formats: NATIVE_FORMATS, lensFacing: 'BACK' });
    // Variable torch brightness — only if this device's camera reports more than one level.
    try{
      const r = await MLKit.getMaxTorchStrengthLevel();
      const max = r && r.maxLevel || 0;
      if(max > 1) setupTorchSlider(max);
    }catch(_){}
  }catch(err){
    camErr('Native scanner failed: ' + ((err && err.message) || err) + ' — type the SKU instead.');
  }
}
function setupTorchSlider(max){
  torchMax = max;
  if(!(torchLevel >= 1 && torchLevel <= max)) torchLevel = max;   // default to brightest
  const s = $('torchLevel'); s.min = 1; s.max = max; s.step = 1; s.value = torchLevel;
  $('torchVal').textContent = torchLevel + '/' + max;
  $('torchWrap').hidden = false;
  applyTorchLevel(torchLevel);
}
async function applyTorchLevel(v){
  if(!torchMax) return;
  torchLevel = Math.max(1, Math.min(torchMax, Math.round(Number(v) || 1)));
  $('torchLevel').value = torchLevel; $('torchVal').textContent = torchLevel + '/' + torchMax;
  savePrefs();
  if(NATIVE && MLKit){ try{ await MLKit.setTorchStrengthLevel({ level: torchLevel }); }catch(_){} }
}
$('torchLevel').addEventListener('input', e=>applyTorchLevel(e.target.value));
$('torchUp').onclick   = ()=>applyTorchLevel(torchLevel + 1);
$('torchDown').onclick = ()=>applyTorchLevel(torchLevel - 1);
function handleDetected(val){
  const now = Date.now();
  if(scanMode==='auto'){
    if(!autoPaused && val && (val!==lastCode || now-lastAt>2500)){
      lastCode=val; lastAt=now; onScan(val); pauseAuto(true);   // scan once, then pause
    }
  } else if(val){
    // Tap mode: remember what's framed and keep the Scan button "ready". pendingAt drives a
    // hold window so flaky frame-to-frame detection can't flicker the button out from under a tap.
    pendingCode = val; pendingAt = now;
    const c=$('capture'); c.disabled=false; c.classList.add('ready'); c.textContent = '📷 Scan: '+val;
  }
}
/* ---- Flashlight / torch (Android Chrome only) ---- */
let torchTrack = null, torchOn = false;
function setupTorch(stream){
  const track = stream.getVideoTracks()[0];
  const caps = track.getCapabilities ? track.getCapabilities() : {};
  if(!caps.torch){ $('torch').hidden = true; return; }   // unsupported (e.g. iPhone)
  torchTrack = track; $('torch').hidden = false;
}
async function toggleTorch(){
  if(NATIVE && MLKit){                                       // native torch via the ML Kit plugin
    nativeTorchOn = !nativeTorchOn;
    try{
      await (nativeTorchOn ? MLKit.enableTorch() : MLKit.disableTorch());
      const b = $('torch'); b.textContent = '🔦 Light: ' + (nativeTorchOn ? 'On' : 'Off'); b.classList.toggle('on', nativeTorchOn);
    }catch(err){ nativeTorchOn = !nativeTorchOn; camErr('Flashlight unavailable: ' + ((err && err.message) || err)); }
    return;
  }
  if(!torchTrack) return;
  torchOn = !torchOn;
  try{
    await torchTrack.applyConstraints({ advanced:[{ torch: torchOn }] });
    const b = $('torch');
    b.textContent = '🔦 Light: ' + (torchOn ? 'On' : 'Off');
    b.classList.toggle('on', torchOn);
  }catch(err){ torchOn = !torchOn; camErr('Flashlight unavailable: ' + ((err && err.message) || err)); }
}
$('torch').onclick = toggleTorch;

/* ---- Focus: continuous by default, optional Macro lock for close 2D codes ---- */
let focusTrack = null, focusCaps = null, macroOn = !!PREF.macro;
function setupFocus(stream){
  const t = stream.getVideoTracks()[0];
  focusCaps = t.getCapabilities ? t.getCapabilities() : {};
  focusTrack = t;
  const canMacro = !!(focusCaps.focusMode && focusCaps.focusMode.includes('manual') && focusCaps.focusDistance);
  $('macro').hidden = !canMacro;
  $('macro').textContent = '🔬 Macro: ' + (macroOn ? 'On' : 'Off');
  $('macro').classList.toggle('on', macroOn);
  setTimeout(applyFocusMode, 500);   // let the hardware settle before enforcing focus
}
function applyFocusMode(){
  if(!focusTrack || !focusCaps) return;
  let adv = null;
  // Macro fix for the "sticky focus locks at infinity" bug on multi-lens Androids:
  if(macroOn && focusCaps.focusMode && focusCaps.focusMode.includes('manual') && focusCaps.focusDistance){
    adv = { focusMode:'manual', focusDistance: focusCaps.focusDistance.min + (focusCaps.focusDistance.step || 0.1) };
  } else if(focusCaps.focusMode && focusCaps.focusMode.includes('continuous')){
    adv = { focusMode:'continuous' };
  }
  if(adv){ focusTrack.applyConstraints({ advanced:[adv] }).catch(()=>{}); }
}
function setMacro(v){
  macroOn = v;
  $('macro').textContent = '🔬 Macro: ' + (v ? 'On' : 'Off');
  $('macro').classList.toggle('on', v);
  savePrefs(); applyFocusMode();
}
$('macro').onclick = ()=> setMacro(!macroOn);
function flashRing(x, y){
  const r = $('focusRing');
  r.style.left = x+'px'; r.style.top = y+'px';
  r.classList.remove('show'); void r.offsetWidth;  // restart the animation
  r.classList.add('show');
  clearTimeout(flashRing._t); flashRing._t = setTimeout(()=>r.classList.remove('show'), 700);
}
async function focusAt(e){
  const v = $('video'); const rect = v.getBoundingClientRect();
  if(!rect.width) return;
  const px = e.clientX - rect.left, py = e.clientY - rect.top;
  flashRing(px, py);                                  // feedback always
  if(!focusTrack) return;
  const caps = focusTrack.getCapabilities ? focusTrack.getCapabilities() : {};
  const adv = {};
  // Focus at the tapped point if supported, and cycle the lens motor to re-rack…
  if(caps.pointsOfInterest){ adv.pointsOfInterest = [{ x: px/rect.width, y: py/rect.height }]; }
  if(caps.focusMode && caps.focusMode.includes('continuous')) adv.focusMode = 'continuous';
  else if(caps.focusMode && caps.focusMode.includes('single-shot')) adv.focusMode = 'single-shot';
  if(Object.keys(adv).length){ try{ await focusTrack.applyConstraints({ advanced:[adv] }); }catch(_){} }
  setTimeout(applyFocusMode, 600);                    // …then settle back to Macro/continuous
}
$('video').addEventListener('click', focusAt);

/* ---- Keep the screen awake while scanning (Wake Lock API) ---- */
let wakeLock = null;
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }catch(_){ } }
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState!=='visible') return;
  keepAwake();
  if(NATIVE) return;                                          // native scanner manages its own camera lifecycle
  const t = activeStream && activeStream.getVideoTracks()[0];
  if(!t || t.readyState==='ended') startScanner();            // camera was released while backgrounded
});

/* ---- Pinch-to-zoom on the camera ---- */
let pinchStart = 0, pinchBase = 1;
function pinchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
$('video').addEventListener('touchstart', e=>{ if(e.touches.length===2){ pinchStart=pinchDist(e.touches); pinchBase=Number($('zoom').value)||1; } }, {passive:true});
$('video').addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinchStart){ e.preventDefault(); applyZoom(pinchBase * (pinchDist(e.touches)/pinchStart)); }
}, {passive:false});
$('video').addEventListener('touchend', ()=>{ pinchStart=0; });

/* ---- Lens detection: main vs 0.5× ultrawide (Android multi-camera) ---- */
let activeStream = null, currentLens = 'main', mainDeviceId = null, uwDeviceId = null, switching = false;
async function detectLenses(stream){
  try{
    const t = stream.getVideoTracks()[0];
    mainDeviceId = (t.getSettings && t.getSettings().deviceId) || null;
    const cams = (await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');
    // Labels are only populated after camera permission is granted (it is, by now).
    const uw = cams.find(d => /ultra|wide/i.test(d.label) && !/tele|zoom/i.test(d.label) && d.deviceId !== mainDeviceId);
    uwDeviceId = uw ? uw.deviceId : null;
  }catch(_){}
}

/* ---- Unified zoom slider — folds the 0.5× ultrawide into the low end ---- */
let zoomTrack = null, mainZoomCaps = null;
function setupZoom(stream){
  const t = stream.getVideoTracks()[0];
  const caps = t.getCapabilities ? t.getCapabilities() : {};
  zoomTrack = caps.zoom ? t : null;
  mainZoomCaps = caps.zoom || null;
  const hasZoom = !!caps.zoom, hasUW = !!uwDeviceId;
  if(!hasZoom && !hasUW){ $('zoomWrap').hidden = true; return; }   // nothing to control (e.g. iPhone)
  const z = $('zoom');
  z.min  = hasUW ? 0.5 : (hasZoom ? caps.zoom.min : 1);            // ultrawide extends below 1.0×
  z.max  = hasZoom ? caps.zoom.max : 1;
  z.step = (hasZoom && caps.zoom.step) ? caps.zoom.step : 0.1;
  const start = Math.min(Number(z.max), Math.max(Number(z.min), 1));   // always open at 1× (main lens)
  z.value = start; $('zoomVal').textContent = start.toFixed(1) + '×';
  $('zoomWrap').hidden = false;
  applyZoom(start);
}
async function applyMainZoom(v){
  if(!zoomTrack || !mainZoomCaps) return;
  v = Math.min(Number(mainZoomCaps.max), Math.max(Number(mainZoomCaps.min), Number(v)));
  try{ await zoomTrack.applyConstraints({ advanced:[{ zoom: v }] }); }catch(_){}
}
async function switchLens(which){
  if(switching || which === currentLens) return;
  const id = which === 'uw' ? uwDeviceId : mainDeviceId;
  if(!id) return;
  switching = true;
  try{
    const s = await navigator.mediaDevices.getUserMedia({ video:{ deviceId:{ exact: id }, width:{ ideal:3840 }, height:{ ideal:2160 } } });
    if(activeStream) activeStream.getTracks().forEach(tr=>tr.stop());
    activeStream = s; const v = $('video'); v.srcObject = s; await v.play();
    watchStream(s);                                            // keep auto-recovery armed on the new lens
    currentLens = which;
    torchOn = false; $('torch').textContent = '🔦 Light: Off'; $('torch').classList.remove('on');
    setupTorch(s); setupFocus(s);
    const t = s.getVideoTracks()[0]; const caps = t.getCapabilities ? t.getCapabilities() : {};
    zoomTrack = caps.zoom ? t : null;
    if(which === 'main') mainZoomCaps = caps.zoom || null;
  }catch(_){}
  switching = false;
}
let zoomDebounce = 0;
async function applyZoom(v){
  const z = $('zoom');
  v = Math.min(Number(z.max), Math.max(Number(z.min), Number(v)));
  z.value = v; $('zoomVal').textContent = v.toFixed(1) + '×'; savePrefs();
  // Below 1.0× → ultrawide lens (if present); 1.0×+ → main lens + digital zoom.
  if(uwDeviceId && v < 1.0){ await switchLens('uw'); }
  else { await switchLens('main'); await applyMainZoom(v); }
}
$('zoom').addEventListener('input', e=>{ const val=e.target.value; clearTimeout(zoomDebounce); zoomDebounce=setTimeout(()=>applyZoom(val), 60); });
$('zoomIn').onclick  = ()=>applyZoom(Number($('zoom').value) + Number($('zoom').step||0.1) * 5);
$('zoomOut').onclick = ()=>applyZoom(Number($('zoom').value) - Number($('zoom').step||0.1) * 5);

/* ---- Auto-mode pause/resume (scan once, then wait) ---- */
let AUTO_PAUSE_SECS = Number(PREF.autoWait) || 30;
let waitForReady = !!PREF.waitForReady;
function setWaitForReady(v){
  waitForReady = v;
  const b = $('waitReady');
  b.textContent = '⏸️ Wait for Ready: ' + (v ? 'On' : 'Off');
  b.classList.toggle('on', v);
  $('waitWrap').style.display = v ? 'none' : '';   // countdown irrelevant when on
  if(scanMode === 'auto'){
    if(v) pauseAuto(false);               // gate the next scan (incl. the first) behind a Ready tap
    else if(autoPaused) resumeAuto();     // turning it off resumes auto scanning
  }
  savePrefs();
}
$('waitReady').onclick = ()=> setWaitForReady(!waitForReady);
function setAutoWait(s){
  s = Math.min(120, Math.max(5, Math.round(Number(s)/5)*5));
  AUTO_PAUSE_SECS = s;
  $('waitSlider').value = s; $('waitVal').textContent = s+'s';
  savePrefs();
}
$('waitSlider').addEventListener('input', e=>setAutoWait(e.target.value));
$('waitUp').onclick   = ()=>setAutoWait(AUTO_PAUSE_SECS + 5);
$('waitDown').onclick = ()=>setAutoWait(AUTO_PAUSE_SECS - 5);
let autoPaused = false, autoTimer = null, autoTick = null;
function clearAutoTimers(){ clearTimeout(autoTimer); clearInterval(autoTick); autoTimer = autoTick = null; }
function pauseAuto(fromScan){
  autoPaused = true; clearAutoTimers();
  const b = $('autoCtrl'); b.classList.add('paused');
  if(fromScan && !waitForReady){
    let left = AUTO_PAUSE_SECS;
    const render = ()=>{ b.textContent = '▶️ Ready to scan ('+left+'s)'; };
    render();
    autoTick  = setInterval(()=>{ left--; if(left<=0) resumeAuto(); else render(); }, 1000);
    autoTimer = setTimeout(resumeAuto, AUTO_PAUSE_SECS*1000);   // auto-resume after the wait
  } else {
    b.textContent = (fromScan || waitForReady) ? '▶️ Ready to scan' : '▶️ Paused — tap to resume';   // waits for tap
  }
}
function resumeAuto(){
  autoPaused = false; clearAutoTimers();
  lastCode = ''; lastAt = 0;                                    // allow the next item to scan
  const b = $('autoCtrl'); b.classList.remove('paused'); b.textContent = '⏸ Pause';
}
$('autoCtrl').onclick = ()=>{ autoPaused ? resumeAuto() : pauseAuto(false); };

/* ---- Scan mode: Tap (default) vs Auto ---- */
let scanMode = 'tap', pendingCode = '', pendingAt = 0;
function setScanMode(m){ scanMode = m;
  $('scanmode').textContent = m==='tap' ? '🖐️ Tap to Scan' : '⚡ Auto Scan';
  $('capture').hidden = (m!=='tap');
  $('autoCtrl').hidden = (m!=='auto');
  $('camHint').textContent = (m==='tap' ? 'Frame the QR, then tap “Scan”.' : 'Auto: scans one item, then pauses — tap Ready for the next.') + ' Tap the image to focus.';
  pendingCode=''; $('capture').disabled=true; $('capture').classList.remove('ready'); $('capture').textContent='📷 Scan';
  if(m==='auto'){ waitForReady ? pauseAuto(false) : resumeAuto(); }   // auto+wait starts in Ready state
  else { autoPaused=false; clearAutoTimers(); }
  savePrefs();
}
$('scanmode').onclick = ()=> setScanMode(scanMode==='tap' ? 'auto' : 'tap');
$('capture').onclick = ()=>{ if(pendingCode) onScan(pendingCode); };

/* ---- Scan beep (one shared AudioContext, unlocked on first touch) ---- */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(_){ return null; } }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('pointerdown', ensureAudio);   // satisfy autoplay policy
function beep(){
  const a = ensureAudio(); if(!a) return;
  try{
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'square'; o.frequency.value = 880; g.gain.value = 0.18;
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + 0.12);
  }catch(_){ }
}

function onScan(sku){
  beep(); if(navigator.vibrate) navigator.vibrate(40);
  $('sku').value = sku;
  showPreview(sku);
  if(mode==='receive') submit();        // receiving: auto-add on each scan
  else $('qty').focus();                 // count: let them type the number
}

/* ---- Session counter + success flash ---- */
let sessCount = 0;
function bumpCount(){ sessCount++; $('sessCount').textContent = sessCount+' scanned'; }
function flashOK(){ const f=$('flash'); f.classList.add('show'); setTimeout(()=>f.classList.remove('show'), 220); }

/* ---- Offline retry queue (survives reloads via localStorage) ---- */
let queue = JSON.parse(localStorage.getItem('scanQueue')||'[]'), flushing = false;
function saveQueue(){ try{ localStorage.setItem('scanQueue', JSON.stringify(queue)); }catch(_){ } updateQueueBadge(); }
function updateQueueBadge(){ const b=$('queueBadge'); if(queue.length){ b.hidden=false; b.textContent=queue.length+' queued'; } else b.hidden=true; }
let flushFails = 0;
async function flushQueue(){
  if(flushing || !queue.length) return; flushing = true;
  while(queue.length){
    try{
      const d = await sendPayload(queue[0]);
      if(d && d.ok){ queue.shift(); saveQueue(); bumpCount(); flushFails = 0; if(d.scanId) lastScanId = d.scanId; }
      else { flushFails++; break; }     // online but server rejected — stop, never drop the row
    }catch(_){ flushFails++; break; }    // still offline — try again later
  }
  flushing = false;
  if(!queue.length){ flushFails = 0; status('All queued scans sent.'); }
  else if(flushFails >= 3){ status('⚠ '+queue.length+' scan(s) not sending — check connection.', true); }
}
window.addEventListener('online', flushQueue);
setInterval(flushQueue, 15000);

/* ---- Submit / logging ---- */
function buildPayload(sku, qty){ return { sku, qty, mode, note: $('bin').value.trim(), secret: SHARED_SECRET }; }
async function sendPayload(p){
  const r = await fetch(APPS_SCRIPT_URL, { method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },   // text/plain avoids CORS preflight
    body: JSON.stringify(p) });
  return r.json();
}
let submitting = false, lastScanId = null;   // lastScanId → sent on undo so the backend removes THIS device's row
async function submit(){
  if(submitting) return;                                     // guard against concurrent/rapid double-submit
  const sku = $('sku').value.trim(); const qty = parseInt($('qty').value, 10);
  if(!sku){ status('Enter or scan a SKU', true); return; }
  if(isNaN(qty)){ status('Enter a quantity', true); return; }
  const p = buildPayload(sku, qty);
  submitting = true; $('submit').disabled = true; status('Saving…');
  try{
    const d = await sendPayload(p);
    if(d.ok){
      flashOK(); bumpCount(); $('undo').hidden = false; lastScanId = d.scanId || null;
      logRow(true, sku, (mode==='receive'?'+':'set ')+d.qty, '#'+d.loggedRows);
      status('Logged ('+d.loggedRows+' total rows)');
      if(mode==='receive'){ $('qty').value=1; $('sku').value=''; showPreview(''); }
    } else { logRow(false, sku, '—', d.error); status(d.error, true); }
  }catch(err){
    queue.push(p); saveQueue();                              // offline → queue + auto-retry
    logRow('queued', sku, (mode==='receive'?'+':'set ')+qty, 'queued (offline)');
    status('Offline — queued for retry ('+queue.length+')', true);
    if(mode==='receive'){ $('qty').value=1; $('sku').value=''; showPreview(''); }
  }finally{
    submitting = false; $('submit').disabled = false;
  }
}
$('submit').onclick = submit;
$('sku').addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
$('sku').addEventListener('input', e=>{ showPreview(e.target.value.trim()); });
$('bin').addEventListener('input', savePrefs);

/* ---- Undo last logged scan (backend deletes the last sheet row) ---- */
async function undoLast(){
  if(queue.length){ status('Send queued scans before undoing.', true); return; }
  $('undo').disabled = true; status('Undoing…');
  try{
    const d = await sendPayload({ action:'undo', scanId: lastScanId, secret: SHARED_SECRET });
    if(d.ok){ logRow('undo', (d.removed&&d.removed[2])||'—', 'undo', 'removed row #'+d.removedRow); status('Undid last scan.'); $('undo').hidden = true; lastScanId = null; }
    else status(d.error||'Undo failed', true);
  }catch(err){ status('Undo failed (offline?)', true); }
  $('undo').disabled = false;
}
$('undo').onclick = undoLast;

function status(msg, bad){ const s=$('status'); s.textContent=msg; s.className = 'hint'+(bad?' err':''); }
function logRow(ok, sku, qty, note){
  const cls = ok===true ? 'ok' : ok==='queued' ? 'queued' : ok==='undo' ? 'undo' : 'bad';
  const d=document.createElement('div'); d.className='row '+cls; d.dataset.sku = sku || '';
  const left=document.createElement('div');
  const q=document.createElement('div'); q.textContent = qty;
  const s=document.createElement('div'); s.className='q'; s.textContent = sku;
  left.appendChild(q); left.appendChild(s);
  const right=document.createElement('div'); right.className='rrow';
  const n=document.createElement('div'); n.className='q'; n.textContent = note;
  const v=document.createElement('div'); v.className='view'; v.textContent = '🔍';   // tap row → product image
  right.appendChild(n); right.appendChild(v);
  d.appendChild(left); d.appendChild(right);
  const log=$('log'); log.prepend(d);
  while(log.children.length > 80) log.removeChild(log.lastChild);   // cap DOM growth over long sessions
}

/* ---- Tap a logged row to view that product's image (from sku-map.json) ---- */
let modalOpen = false;   // pauses camera detection while the image popup is open
function openImageModal(sku){
  const rec = sku && SKU_MAP[sku];
  const img=$('imodalImg'), nm=$('imodalName');
  $('imodalSku').textContent = sku || '';
  img.onerror = ()=>{ img.style.display='none'; };
  if(rec){
    img.style.display='block'; img.src = IMG_BASE + rec[1];
    nm.textContent = rec[0]; nm.className='nm';
  } else {
    img.style.display='none'; img.removeAttribute('src');
    nm.textContent = sku ? 'No image for this SKU' : 'No SKU'; nm.className='nm unknown';
  }
  modalOpen = true;                       // pause scanning while viewing
  $('imodal').classList.add('show');
}
function closeImageModal(){ modalOpen = false; $('imodal').classList.remove('show'); }
$('imodalClose').onclick = closeImageModal;
$('imodal').addEventListener('click', e=>{ if(e.target===$('imodal')) closeImageModal(); });
$('log').addEventListener('click', e=>{ const r=e.target.closest('.row'); if(r) openImageModal(r.dataset.sku); });

/* ---- Init from saved preferences ---- */
$('bin').value = PREF.bin || '';
setAutoWait(AUTO_PAUSE_SECS);        // sync slider/label to saved wait time
setWaitForReady(waitForReady);      // sync the toggle
setMode(mode);                      // mode already = PREF.mode || 'receive'
setScanMode(PREF.scanMode || 'tap');
updateQueueBadge();
flushQueue();                       // resend anything queued from a prior offline session
(NATIVE && MLKit) ? startNativeScan() : startScanner();   // native ML Kit scanner in the app; web BarcodeDetector elsewhere

/* ---- Register the service worker (offline app shell; powers the installable PWA/APK) ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

/* ---- One-tap install: Chrome no longer auto-prompts, so surface our own button ---- */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt = e; $('installBtn').classList.add('show'); });
$('installBtn').onclick = async ()=>{
  if(!deferredPrompt) return;
  $('installBtn').classList.remove('show');
  deferredPrompt.prompt();
  try{ await deferredPrompt.userChoice; }catch(_){}
  deferredPrompt = null;
};
window.addEventListener('appinstalled', ()=>{ $('installBtn').classList.remove('show'); deferredPrompt = null; });
</script>
</body>
</html>
